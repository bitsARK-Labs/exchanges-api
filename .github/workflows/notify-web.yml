name: Notify bitsark-web on Data Change

on:
  push:
    branches: [main]
    paths:
      - "data/exchanges.json"

jobs:
  notify:
    name: Trigger bitsark-web rebuild
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch rebuild event to bitsark-web
        run: |
          curl -s -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.BITSARK_WEB_DEPLOY_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/bitsARK-Labs/bitsark-web/dispatches \
            -d '{"event_type":"exchanges-data-updated","client_payload":{"source":"data-push"}}'
