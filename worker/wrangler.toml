name = "bitsark-exchanges-api"
main = "index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[[routes]]
pattern = "api.bitsark.com/v1/*"
zone_name = "bitsark.com"

# To enable rate limiting, create a KV namespace in Cloudflare dashboard:
# 1. Workers & Pages → KV → Create namespace → name: bitsark-rate-limit
# 2. Copy the ID below and uncomment
#
# [[kv_namespaces]]
# binding = "RATE_LIMIT_KV"
# id = "YOUR_KV_NAMESPACE_ID"